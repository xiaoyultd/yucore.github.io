<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yucore 私人客户开发系统</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Yucore Industrial Supply">
      <span class="brand-mark">YX</span>
      <span>
        <strong>私人客户开发系统</strong>
        <small>线索库、去重比对、销售流程</small>
      </span>
    </a>
    <nav class="top-nav" aria-label="System navigation">
      <a href="index.html">公开网站</a>
      <a href="#lead-engine">线索引擎</a>
      <a href="#library">线索库</a>
      <a href="#messages">营销话术</a>
    </nav>
  </header>

  <main class="system-main">
    <section class="section private-section" id="lead-engine">
      <div class="lock-panel" id="lockPanel">
        <p class="eyebrow">仅限本人使用</p>
        <h1>俄罗斯机电客户开发系统</h1>
        <p class="hero-text">数据保存在你自己的浏览器里。新邮箱、官网、电话出现后，会先和线索库比对，去重后再展示和保存。</p>
        <div class="login-row">
          <input id="passwordInput" type="password" placeholder="输入密码">
          <button id="unlockBtn" class="btn primary" type="button">打开系统</button>
        </div>
        <small>默认密码：<strong>summer2026</strong>。可在 <code>app.js</code> 修改。</small>
      </div>

      <div class="tool-shell hidden" id="toolShell">
        <div class="tool-head">
          <div>
            <p class="eyebrow">线索引擎</p>
            <h2>搜索、导入、比对、保存客户线索</h2>
          </div>
          <div class="tool-actions">
            <button id="exportBtn" class="btn secondary" type="button">导出 CSV</button>
            <button id="clearBtn" class="btn ghost" type="button">清空线索库</button>
          </div>
        </div>

        <div class="control-grid">
          <label>城市
            <select id="citySelect"></select>
          </label>
          <label>行业
            <select id="industrySelect"></select>
          </label>
          <label>产品方向
            <select id="productSelect"></select>
          </label>
          <label>客户金额
            <select id="valueSelect">
              <option value="10000">$10,000+</option>
              <option value="30000">$30,000+</option>
              <option value="50000">$50,000+</option>
            </select>
          </label>
        </div>

        <div class="button-row">
          <button id="generateBtn" class="btn primary" type="button">生成 30 条研究目标</button>
          <button id="searchYandexBtn" class="btn secondary" type="button">打开 Yandex 地图</button>
          <button id="searchWebBtn" class="btn secondary" type="button">打开 Yandex 搜索</button>
        </div>

        <div class="library-tools">
          <section class="import-panel">
            <h3>导入真实线索</h3>
            <p>粘贴新线索后，系统会用邮箱、官网、电话和已有线索库比对，只保存不重复的新线索。</p>
            <textarea id="importBox" rows="6" placeholder="公司 | 官网 | 邮箱 | WhatsApp/电话 | 城市 | 行业 | 产品 | 联系人 | 职位 | 来源 | 备注"></textarea>
            <div class="button-row">
              <button id="compareBtn" class="btn secondary" type="button">只比对</button>
              <button id="importBtn" class="btn primary" type="button">只导入新线索</button>
            </div>
          </section>

          <section class="manual-panel">
            <h3>公司基础信息</h3>
            <div class="profile-grid">
              <input id="manualCompany" placeholder="公司名称">
              <input id="manualWebsite" placeholder="官网">
              <input id="manualEmail" placeholder="邮箱">
              <input id="manualPhone" placeholder="WhatsApp / 电话">
              <input id="manualContact" placeholder="联系人">
              <input id="manualPosition" placeholder="职位">
              <input id="manualTax" placeholder="INN / 税号">
              <input id="manualAddress" placeholder="工厂 / 办公地址">
              <input id="manualProducts" placeholder="产品或设备需求">
              <input id="manualSource" placeholder="来源，例如 Yandex、海关数据、展会">
            </div>
            <textarea id="manualNotes" rows="4" placeholder="公司背景、进口痕迹、项目线索、决策人备注"></textarea>
            <button id="addManualBtn" class="btn primary full" type="button">保存到线索库</button>
          </section>
        </div>

        <div class="dashboard-grid">
          <article class="insight-card">
            <span>已保存公司</span>
            <strong id="storedCount">0</strong>
          </article>
          <article class="insight-card">
            <span>平均成交评分</span>
            <strong id="avgScore">0</strong>
          </article>
          <article class="insight-card">
            <span>已拦截重复</span>
            <strong id="duplicateCount">0</strong>
          </article>
          <article class="insight-card">
            <span>下一步动作</span>
            <strong id="nextAction">核对联系方式</strong>
          </article>
        </div>

        <div class="workspace-grid" id="library">
          <section class="lead-list-wrap">
            <div class="list-title">
              <h3>线索库</h3>
              <input id="leadFilter" type="search" placeholder="筛选公司、邮箱、城市、行业">
            </div>
            <div id="compareResult" class="compare-result"></div>
            <div id="leadList" class="lead-list"></div>
          </section>

          <aside class="guide-panel" id="messages">
            <h3>销售指南</h3>
            <div id="salesGuide"></div>
            <h3>可复制营销话术</h3>
            <div class="message-tabs">
              <button class="msg-tab active" data-message="early" type="button">前期打招呼</button>
              <button class="msg-tab" data-message="middle" type="button">中期拓展</button>
              <button class="msg-tab" data-message="late" type="button">后期维护</button>
            </div>
            <textarea id="messageBox" rows="12"></textarea>
            <button id="copyMsgBtn" class="btn primary full" type="button">复制话术</button>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
